<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">
    <style>
        .checkout-container {
            max-width: 600px;
            margin: 100px auto;
            text-align: center;
            padding: 60px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-lg);
            backdrop-filter: blur(20px);
        }
        .checkout-methods {
            margin-top: 40px;
            display: grid;
            gap: 20px;
        }
        .method-card {
            display: block;
            padding: 30px;
            background: #fff;
            color: #000;
            text-decoration: none;
            border-radius: var(--radius-md);
            font-weight: 900;
            text-transform: uppercase;
            font-family: 'Space Mono', monospace;
            transition: 0.4s;
            font-size: 1.2rem;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }
        .method-card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.4);
            background: #000;
            color: #fff;
        }
    </style>
</head>
<body class="fade-in">
    <canvas id="tunnel-bg"></canvas>
    <nav>

        <div class="checkout-container">
            <p class="eyebrow">Final Step</p>
            <h1>Complete Purchase</h1>
            <p>Select your preferred payment method below to finalize your order.</p>
            
            <div class="checkout-methods">
                <a href="https://ko-fi.com/srtttttt" target="_blank" class="method-card">
                    Ko-fi Checkout
                </a>
            </div>
